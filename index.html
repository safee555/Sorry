<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry Humaira ❤️</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙉</text></svg>">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* floating hearts */

.bg-heart{
position:fixed;
font-size:18px;
opacity:0.5;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* card */

.card{
background:white;
padding:35px;
border-radius:20px;
text-align:center;
width:90%;
max-width:420px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
position:relative;
}

h1{
color:#ff4d6d;
font-size:28px;
}

p{
color:#555;
font-size:18px;
line-height:1.5;
margin-bottom:30px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
}

button{
padding:14px 28px;
font-size:18px;
border-radius:30px;
border:none;
cursor:pointer;
}

#yesBtn{
background:#ff4d6d;
color:white;
}

#noBtn{
background:#eee;
border:2px solid #ff4d6d;
}

/* toast */

#toast{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#ff4d6d;
color:white;
padding:10px 18px;
border-radius:25px;
opacity:0;
transition:0.3s;
}

/* final screen */

#final{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
text-align:center;
opacity:0;
pointer-events:none;
}

#typeText{
max-width:500px;
font-size:22px;
}

.confetti{
position:fixed;
font-size:22px;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(100vh);}
}

#music{
position:fixed;
top:20px;
right:20px;
background:white;
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

@media(max-width:480px){

.card{padding:25px;}
h1{font-size:24px;}
p{font-size:16px;}
button{font-size:16px;padding:12px 20px;}

}

</style>

</head>

<body>

<div id="music">🎵</div>

<div class="card">

<h1>Humaira ❤️</h1>

<p>
Sorry baba  
Please you maaf kardo🥺
</p>

<div class="buttons">
<button id="yesBtn">Yes 💕</button>
<button id="noBtn">No 🙉</button>
</div>

</div>

<div id="toast"></div>

<div id="final">
<h1>Thank You Humaira ❤️</h1>
<div id="typeText"></div>
</div>

<audio id="noSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7f7b6b3d7e.mp3"></audio> <audio id="yesSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_88447c1d9b.mp3"></audio> <audio id="musicAudio" loop src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6f1e3b7c63.mp3"></audio>

<script>

/* ============================= */
/* ELEMENT REFERENCES */
/* ============================= */

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const toast = document.getElementById("toast");

const noSound = document.getElementById("noSound");
const yesSound = document.getElementById("yesSound");

const final = document.getElementById("final");
const typeText = document.getElementById("typeText");

const musicAudio = document.getElementById("musicAudio");
const musicBtn = document.getElementById("music");

const isMobile = /Mobi|Android/i.test(navigator.userAgent);

/* ============================= */
/* TELEGRAM SETTINGS */
/* ============================= */

const BOT_TOKEN = "8702884424:AAEqRe5wr6zHrAgzOphFhvydtDyLJsfWpM8";
const CHAT_ID = "1681052146";

/* ============================= */
/* CONTROL FLAGS */
/* ============================= */

let yesClicked = false;
let lastNoAlert = 0;

/* ============================= */
/* TELEGRAM FUNCTIONS */
/* ============================= */

function sendTelegram(text){

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`)
.catch(()=>{});

}

function notifyYes(){

sendTelegram("❤️ Humaira pressed YES");

}

function notifyNo(){

if(yesClicked) return;

/* anti spam (1 second) */
const now = Date.now();

if(now - lastNoAlert < 1000) return;

lastNoAlert = now;

sendTelegram("😅 Humaira tried pressing NO");

}

/* ============================= */
/* FLOATING HEARTS BACKGROUND */
/* ============================= */

setInterval(()=>{

let heart = document.createElement("div");

heart.innerHTML = "💖";
heart.className = "bg-heart";

heart.style.left = Math.random()*100+"vw";
heart.style.animationDuration = 6 + Math.random()*4 + "s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

},700);


/* ============================= */
/* YES BUTTON */
/* ============================= */

yesBtn.onclick = function(){

yesClicked = true;

/* disable NO */
noBtn.style.pointerEvents = "none";

/* telegram */
notifyYes();

/* sound */
yesSound.currentTime = 0;
yesSound.play();

/* hide card */
document.querySelector(".card").style.opacity = 0;

/* show final screen */

setTimeout(()=>{

final.style.opacity = 1;
final.style.pointerEvents = "auto";

typeMessage();
confetti();

},600);

};


/* ============================= */
/* TYPEWRITER MESSAGE */
/* ============================= */

const message = "You just made my day Humaira. I will always protect your smile... You are very special to me ❤️";

let i = 0;

function typeMessage(){

if(i < message.length){

typeText.innerHTML += message.charAt(i);
i++;

setTimeout(typeMessage,40);

}

}


/* ============================= */
/* CONFETTI HEARTS */
/* ============================= */

function confetti(){

for(let i=0;i<50;i++){

let c = document.createElement("div");

c.className = "confetti";
c.innerHTML = "💖";

c.style.left = Math.random()*100+"vw";

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);

}

}


/* ============================= */
/* DESKTOP SMOOTH ESCAPE */
/* ============================= */

if(!isMobile){

document.addEventListener("mousemove",(e)=>{

if(yesClicked) return;

const rect = noBtn.getBoundingClientRect();

const centerX = rect.left + rect.width/2;
const centerY = rect.top + rect.height/2;

const dx = centerX - e.clientX;
const dy = centerY - e.clientY;

const distance = Math.sqrt(dx*dx + dy*dy);

if(distance < 120){

notifyNo();

noSound.currentTime = 0;
noSound.play();

const angle = Math.atan2(dy,dx);

let moveX = Math.cos(angle)*50;
let moveY = Math.sin(angle)*50;

let newX = rect.left + moveX;
let newY = rect.top + moveY;

/* keep inside screen */

newX = Math.max(10, Math.min(window.innerWidth - rect.width - 10, newX));
newY = Math.max(10, Math.min(window.innerHeight - rect.height - 10, newY));

noBtn.style.position = "fixed";
noBtn.style.left = newX + "px";
noBtn.style.top = newY + "px";

}

});

}


/* ============================= */
/* MOBILE INTERACTION */
/* ============================= */

function moveNo(){

if(yesClicked) return;

notifyNo();

noSound.currentTime = 0;
noSound.play();

let rect = noBtn.getBoundingClientRect();

let x = Math.random()*(window.innerWidth - rect.width);
let y = Math.random()*(window.innerHeight - rect.height);

noBtn.style.position = "fixed";
noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}

/* mobile triggers */

noBtn.addEventListener("touchstart",moveNo);
noBtn.addEventListener("click",moveNo);


/* ============================= */
/* MUSIC BUTTON */
/* ============================= */

musicBtn.onclick = function(){

if(musicAudio.paused){

musicAudio.play();
musicBtn.innerHTML="🔊";

}else{

musicAudio.pause();
musicBtn.innerHTML="🎵";

}

};

</script>

</body>
</html>
