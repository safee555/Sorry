<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I’m Sorry ❤️</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙉</text></svg>">

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
padding:20px;
}

/* Card */

.card{
background:white;
padding:35px;
border-radius:20px;
text-align:center;
width:90%;
max-width:420px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
transition:opacity 0.6s ease;
}

h1{
color:#ff4d6d;
font-size:28px;
}

p{
color:#555;
font-size:18px;
margin-bottom:30px;
line-height:1.5;
}

/* Buttons */

.buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

button{
padding:14px 28px;
font-size:18px;
border-radius:30px;
border:none;
cursor:pointer;
}

#yesBtn{
background:#ff4d6d;
color:white;
transition:0.3s;
}

#yesBtn:hover{
transform:scale(1.1);
}

#placeholderNo{
visibility:hidden;
}

#floatingNo{
position:fixed;
border:2px solid #ff4d6d;
background:#eee;
transition:left 0.15s linear, top 0.15s linear;
}

/* Final message */

#finalMessage{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
padding:30px;
opacity:0;
pointer-events:none;
transition:opacity 0.8s ease;
}

#finalMessage h1{
font-size:36px;
margin-bottom:15px;
}

#finalMessage p{
font-size:20px;
max-width:600px;
}

/* Toast */

#toast{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#ff4d6d;
color:white;
padding:10px 18px;
border-radius:25px;
font-size:16px;
opacity:0;
transition:opacity 0.3s;
}

/* Shake animation */

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.shake{
animation:shake 0.4s;
}

/* Hearts */

.heart{
position:fixed;
font-size:22px;
pointer-events:none;
animation:fly 1s ease-out forwards;
}

@keyframes fly{
0%{opacity:1; transform:translateY(0) scale(1);}
100%{opacity:0; transform:translateY(-120px) scale(1.6);}
}

/* Mobile adjustments */

@media(max-width:480px){

.card{
padding:25px;
}

h1{
font-size:24px;
}

p{
font-size:16px;
}

button{
font-size:16px;
padding:12px 22px;
}

}

</style>
</head>

<body>

<div class="card">

<h1>I’m Sorry My Love ❤️</h1>

<p>
I know we had a small fight...  
But you mean everything to me.  
Will you forgive me? 🥺
</p>

<div class="buttons">
<button id="yesBtn">Yes 💕</button>
<button id="placeholderNo">No 🙉</button>
</div>

</div>

<button id="floatingNo">No 🙉</button>

<div id="finalMessage">

<h1>Yaaay ❤️</h1>

<p>
Thank you for forgiving me 🥺💖 <br><br>
You are the most beautiful part of my life.  
I promise to protect your smile forever.
</p>

</div>

<div id="toast">Nice try 😜</div>

<audio id="popSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7f7b6b3d7e.mp3?filename=pop-94319.mp3">
</audio>

<script>

const floatingNo=document.getElementById("floatingNo");
const placeholderNo=document.getElementById("placeholderNo");
const yesBtn=document.getElementById("yesBtn");
const card=document.querySelector(".card");
const finalMessage=document.getElementById("finalMessage");
const toast=document.getElementById("toast");
const sound=document.getElementById("popSound");

let mouseX=0;
let mouseY=0;
let btnX,btnY;
let yesScale=1;

const isMobile=/Mobi|Android/i.test(navigator.userAgent);

window.onload=function(){

const rect=placeholderNo.getBoundingClientRect();

btnX=rect.left;
btnY=rect.top;

floatingNo.style.left=btnX+"px";
floatingNo.style.top=btnY+"px";

};

/* Desktop mouse escape */

if(!isMobile){

document.addEventListener("mousemove",e=>{

mouseX=e.clientX;
mouseY=e.clientY;

const rect=floatingNo.getBoundingClientRect();

const centerX=rect.left+rect.width/2;
const centerY=rect.top+rect.height/2;

const dx=centerX-mouseX;
const dy=centerY-mouseY;

const distance=Math.sqrt(dx*dx+dy*dy);

if(distance<130){

const angle=Math.atan2(dy,dx);

btnX+=Math.cos(angle)*12;
btnY+=Math.sin(angle)*12;

btnX=Math.max(10,Math.min(window.innerWidth-rect.width-10,btnX));
btnY=Math.max(10,Math.min(window.innerHeight-rect.height-10,btnY));

floatingNo.style.left=btnX+"px";
floatingNo.style.top=btnY+"px";

}

});

}

/* Mobile tap behavior */

if(isMobile){

floatingNo.addEventListener("touchstart",function(e){

e.preventDefault();

const rect=floatingNo.getBoundingClientRect();

btnX=Math.random()*(window.innerWidth-rect.width-20);
btnY=Math.random()*(window.innerHeight-rect.height-20);

floatingNo.style.left=btnX+"px";
floatingNo.style.top=btnY+"px";

floatingNo.classList.add("shake");

setTimeout(()=>floatingNo.classList.remove("shake"),400);

toast.style.opacity="1";
setTimeout(()=>toast.style.opacity="0",1200);

yesScale+=0.12;
yesBtn.style.transform="scale("+yesScale+")";

sound.currentTime=0;
sound.play();

/* Heart explosion */

for(let i=0;i<6;i++){

const heart=document.createElement("div");

heart.innerHTML="💖";
heart.className="heart";

heart.style.left=rect.left+rect.width/2+"px";
heart.style.top=rect.top+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),1000);

}

});

}

yesBtn.onclick=function(){

card.style.opacity="0";

setTimeout(()=>{
finalMessage.style.opacity="1";
finalMessage.style.pointerEvents="auto";
},600);

};

</script>

</body>
</html>
