<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I’m Sorry ❤️</title>

<!-- Monkey Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙉</text></svg>">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

/* Card */
.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:420px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    transition:opacity 0.6s ease;
}

h1{
    color:#ff4d6d;
}

p{
    color:#555;
    font-size:18px;
    margin-bottom:30px;
}

/* Buttons aligned perfectly */
.buttons{
    display:flex;
    justify-content:center;
    gap:30px;
}

/* General button style */
button{
    padding:12px 35px;
    font-size:16px;
    border-radius:30px;
    border:none;
    cursor:pointer;
}

/* YES button */
#yesBtn{
    background:#ff4d6d;
    color:white;
    transition:0.3s;
}

#yesBtn:hover{
    transform:scale(1.1);
}

/* Placeholder NO keeps alignment */
#placeholderNo{
    visibility:hidden;
}

/* Floating NO button */
#floatingNo{
    position:fixed;
    border:2px solid #ff4d6d;
    background:#eee;
    transition:left 0.15s linear, top 0.15s linear;
}

/* Final romantic message */
#finalMessage{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
    padding:40px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.8s ease;
}

#finalMessage h1{
    font-size:48px;
    margin-bottom:20px;
}

#finalMessage p{
    font-size:22px;
    max-width:600px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="card">
    <h1>I’m Sorry My Love ❤️</h1>
    <p>
        I know we had a small fight...  
        But you mean everything to me.  
        Will you forgive me? 🥺
    </p>

    <div class="buttons">
        <button id="yesBtn">Yes 💕</button>
        <button id="placeholderNo">No 🙉</button>
    </div>
</div>

<!-- Floating NO -->
<button id="floatingNo">No 🙉</button>

<!-- Final Romantic Message -->
<div id="finalMessage">
    <h1>Yaaay ❤️</h1>
    <p>
        Thank you for forgiving me 🥺💖 <br><br>
        You are the most beautiful part of my life.  
        I promise to protect your smile forever.  
    </p>
</div>

<script>
const floatingNo = document.getElementById("floatingNo");
const placeholderNo = document.getElementById("placeholderNo");
const yesBtn = document.getElementById("yesBtn");
const card = document.querySelector(".card");
const finalMessage = document.getElementById("finalMessage");

let mouseX = 0;
let mouseY = 0;
let btnX, btnY;

/* Position floating NO exactly over placeholder */
window.onload = function(){
    const rect = placeholderNo.getBoundingClientRect();
    btnX = rect.left;
    btnY = rect.top;

    floatingNo.style.left = btnX + "px";
    floatingNo.style.top = btnY + "px";
};

/* Track mouse */
document.addEventListener("mousemove", e=>{
    mouseX = e.clientX;
    mouseY = e.clientY;

    const rect = floatingNo.getBoundingClientRect();
    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;

    const dx = centerX - mouseX;
    const dy = centerY - mouseY;
    const distance = Math.sqrt(dx*dx + dy*dy);

    const safeDistance = 130;

    if(distance < safeDistance){
        const angle = Math.atan2(dy, dx);

        btnX += Math.cos(angle) * 12;
        btnY += Math.sin(angle) * 12;

        btnX = Math.max(10, Math.min(window.innerWidth - rect.width - 10, btnX));
        btnY = Math.max(10, Math.min(window.innerHeight - rect.height - 10, btnY));

        floatingNo.style.left = btnX + "px";
        floatingNo.style.top = btnY + "px";
    }
});

/* YES click effect */
yesBtn.onclick = function(){
    card.style.opacity = "0";

    setTimeout(()=>{
        finalMessage.style.opacity = "1";
        finalMessage.style.pointerEvents = "auto";
    },600);
};
</script>

</body>
</html>
